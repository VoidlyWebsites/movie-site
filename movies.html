<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Movies</title>

<style>
body{
margin:0;
background:#141414;
color:white;
font-family:Arial;
}

header{
background:#000;
padding:15px 30px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

.search{
padding:8px;
border:none;
border-radius:4px;
}

.section{
padding:20px 30px;
}

.row{
display:flex;
overflow-x:auto;
gap:12px;
}

.row::-webkit-scrollbar{
display:none;
}

.movie{
min-width:150px;
transition:transform .2s;
cursor:pointer;
}

.movie:hover{
transform:scale(1.1);
}

.movie img{
width:150px;
border-radius:6px;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:#222;
padding:20px;
border-radius:10px;
max-width:400px;
}

</style>
</head>

<body>

<header>
<div class="logo">MovieBox</div>
<input id="search" class="search" placeholder="Search movies">
</header>

<div class="section">
<h2>🔥 Trending</h2>
<div class="row" id="trending"></div>
</div>

<div class="section">
<h2>⭐ Top Rated</h2>
<div class="row" id="top"></div>
</div>

<div class="section">
<h2>🎬 Popular</h2>
<div class="row" id="popular"></div>
</div>

<div id="popup">
<div class="popup-content" id="popupContent"></div>
</div>

<script>

const apiKey="15da72279e2e57dc3dd3d8ae998933c5"
const img="https://image.tmdb.org/t/p/w500"

async function getMovies(url,container){

const res=await fetch(url)
const data=await res.json()

const row=document.getElementById(container)

data.results.forEach(movie=>{

if(!movie.poster_path) return

const div=document.createElement("div")
div.className="movie"

div.innerHTML=`<img src="${img+movie.poster_path}">`

div.onclick=()=>showMovie(movie)

row.appendChild(div)

})

}

function showMovie(movie){

document.getElementById("popup").style.display="flex"

document.getElementById("popupContent").innerHTML=`
<h2>${movie.title}</h2>
<p>${movie.overview}</p>
<p>⭐ Rating: ${movie.vote_average}</p>
<button onclick="closePopup()">Close</button>
`

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

document.getElementById("search").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

const query=e.target.value

document.getElementById("popular").innerHTML=""

await getMovies(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${query}`,"popular")

}

})

getMovies(`https://api.themoviedb.org/3/trending/movie/week?api_key=${apiKey}`,"trending")

getMovies(`https://api.themoviedb.org/3/movie/top_rated?api_key=${apiKey}`,"top")

getMovies(`https://api.themoviedb.org/3/movie/popular?api_key=${apiKey}`,"popular")

</script>

</body>
</html>
